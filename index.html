<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ptx2</title>
<style>
  :root{
    --blurple:#5865F2;
    --blurple-dark:#3d44a8;
    --navy:#1e2140;
    --navy-deep:#12132b;
    --card-bg:#232631;
    --card-bg-2:#2b2f3d;
    --text-main:#ffffff;
    --text-dim:#b7bcd6;
    --online:#3ba55d;
    --yt-red:#FF0000;
    --accent-pink:#ff6fd8;
    --accent-warn:#f23f5d;
  }

  *{ box-sizing:border-box; margin:0; padding:0; }

  html,body{
    height:100%;
    font-family:'gg sans','Segoe UI',Helvetica,Arial,sans-serif;
    overflow-x:hidden;
  }

  body{
    animation:page-fade-in 1s ease both;
  }

  @keyframes page-fade-in{
    from{ opacity:0; }
    to{ opacity:1; }
  }

  @media (prefers-reduced-motion: reduce){
    body{ animation:none; }
  }

  body{
    display:flex;
    align-items:center;
    justify-content:center;
    min-height:100vh;
    background:
      radial-gradient(1100px 700px at 15% 20%, rgba(35,42,130,0.28), transparent 60%),
      radial-gradient(1000px 650px at 85% 15%, rgba(28,34,110,0.22), transparent 55%),
      radial-gradient(1200px 800px at 50% 100%, rgba(20,25,90,0.3), transparent 60%),
      linear-gradient(160deg, #030308 0%, #07081a 45%, #0d0f2c 100%);
    position:relative;
    color:var(--text-main);
  }

  body::before{
    content:"";
    position:fixed;
    inset:0;
    backdrop-filter:blur(2px);
    background:rgba(2,3,10,0.45);
    z-index:0;
    pointer-events:none;
  }

  /* Discord-style floating panorama blobs */
  .blob{
    position:fixed;
    border-radius:50%;
    filter:blur(100px);
    opacity:0.22;
    z-index:0;
    animation: drift 18s ease-in-out infinite;
  }
  .blob.b1{
    width:480px; height:480px;
    top:-120px; left:-140px;
    background:radial-gradient(circle at 30% 30%, rgba(88,101,242,0.9), transparent 70%);
    animation-delay:0s;
  }
  .blob.b2{
    width:560px; height:560px;
    bottom:-180px; right:-160px;
    background:radial-gradient(circle at 60% 40%, rgba(88,101,242,0.7), transparent 70%);
    animation-delay:-6s;
  }
  .blob.b3{
    width:400px; height:400px;
    top:20%; right:5%;
    background:radial-gradient(circle at 40% 60%, rgba(140,150,255,0.5), transparent 70%);
    animation-delay:-12s;
  }

  @keyframes drift{
    0%,100%{ transform:translate(0,0) scale(1); }
    50%{ transform:translate(30px,-25px) scale(1.06); }
  }

  @media (prefers-reduced-motion: reduce){
    .blob{ animation:none; }
  }

  /* Ambient drifting particles */
  #particles{
    position:fixed;
    inset:0;
    z-index:1;
    pointer-events:none;
    overflow:hidden;
  }

  .particle{
    position:absolute;
    bottom:-10px;
    width:4px; height:4px;
    border-radius:50%;
    background:rgba(255,255,255,0.65);
    box-shadow:0 0 6px 1px rgba(255,255,255,0.5);
    animation-name:float-up;
    animation-timing-function:linear;
    animation-iteration-count:infinite;
  }

  @keyframes float-up{
    0%{ transform:translateY(0) translateX(0); opacity:0; }
    10%{ opacity:0.9; }
    90%{ opacity:0.5; }
    100%{ transform:translateY(-110vh) translateX(var(--drift,20px)); opacity:0; }
  }

  @media (prefers-reduced-motion: reduce){
    .particle{ animation:none; display:none; }
  }

  .stage{
    position:relative;
    z-index:2;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:26px;
    padding:32px 24px;
    width:100%;
    max-width:440px;
  }

  /* --- Discord profile preview bar (rectangle, Discord-widget style) --- */
  .profile-card{
    width:100%;
    max-width:340px;
    background:rgba(28,31,44,0.9);
    border:1px solid rgba(255,255,255,0.06);
    border-radius:12px;
    box-shadow:0 16px 40px rgba(0,0,0,0.5);
    animation: rise 0.7s ease both;
    display:flex;
    align-items:center;
    gap:12px;
    padding:12px 14px;
  }

  .avatar-wrap{
    width:48px; height:48px;
    border-radius:50%;
    flex-shrink:0;
    position:relative;
  }

  .avatar-ring{
    position:absolute;
    inset:-7px;
    border-radius:50%;
    pointer-events:none;
    z-index:1;
  }

  .avatar-ring svg{
    width:100%;
    height:100%;
    animation:ring-pulse 1.6s ease-in-out infinite;
    filter:drop-shadow(0 0 5px rgba(255,50,60,0.75));
  }

  @keyframes ring-pulse{
    0%, 100%{ transform:scale(1) rotate(0deg); opacity:0.9; }
    50%{ transform:scale(1.07) rotate(4deg); opacity:1; }
  }

  @media (prefers-reduced-motion: reduce){
    .avatar-ring svg{ animation:none; }
  }

  .avatar{
    width:100%; height:100%;
    border-radius:50%;
    background:linear-gradient(150deg,#ff9ecf,#8f5fe8 55%,#3a2f77);
    display:flex;
    align-items:center;
    justify-content:center;
    color:#fff;
    overflow:hidden;
  }

  .avatar svg{ width:60%; height:60%; }
  .avatar img{ width:100%; height:100%; object-fit:cover; }

  .status-dot{
    position:absolute;
    bottom:-2px; right:-2px;
    width:16px; height:16px;
    border-radius:50%;
    background:var(--accent-warn);
    border:3px solid #1c1f2c;
    display:flex;
    align-items:center;
    justify-content:center;
    color:#fff;
    font-size:9px;
    font-weight:800;
  }

  .angry-decoration{
    position:absolute;
    top:-6px;
    right:-6px;
    width:20px;
    height:20px;
    border-radius:50%;
    background:radial-gradient(circle at 35% 30%, #ff7a6b, #d81f2a 70%);
    display:flex;
    align-items:center;
    justify-content:center;
    color:#fff;
    box-shadow:0 0 8px rgba(216,31,42,0.85);
    animation:angry-shake 1.8s ease-in-out infinite;
    z-index:2;
  }

  .angry-decoration svg{ width:12px; height:12px; }

  @keyframes angry-shake{
    0%, 20%, 100%{ transform:rotate(0deg) scale(1); }
    4%{ transform:rotate(-14deg) scale(1.05); }
    8%{ transform:rotate(12deg) scale(1.05); }
    12%{ transform:rotate(-8deg) scale(1.02); }
    16%{ transform:rotate(6deg) scale(1); }
  }

  @media (prefers-reduced-motion: reduce){
    .angry-decoration{ animation:none; }
  }

  .profile-text{
    display:flex;
    flex-direction:column;
    justify-content:center;
    min-width:0;
  }

  .display-name{
    font-size:14.5px;
    font-weight:700;
    background:linear-gradient(90deg,#ff9ecf,#c9a6ff);
    -webkit-background-clip:text;
    background-clip:text;
    color:transparent;
    letter-spacing:0.2px;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }

  .status-line{
    display:flex;
    align-items:center;
    gap:5px;
    margin-top:2px;
    font-size:11.5px;
    color:var(--text-dim);
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }

  .status-line .heart{
    color:var(--accent-warn);
    flex-shrink:0;
  }

  /* --- Corner label (inspired by reference site's top-right label) --- */
  .corner-label{
    position:fixed;
    top:22px;
    right:26px;
    z-index:3;
    font-size:13px;
    font-weight:700;
    letter-spacing:0.4px;
    background:rgba(255,255,255,0.06);
    border:1px solid rgba(255,255,255,0.12);
    padding:6px 14px;
    border-radius:20px;
    backdrop-filter:blur(6px);
  }

  .corner-label span{
    background:linear-gradient(90deg,#ff9ecf,#8f9bff,#7ee8fa,#ff9ecf);
    background-size:300% 100%;
    -webkit-background-clip:text;
    background-clip:text;
    color:transparent;
    animation:gradient-shift 6s linear infinite;
  }

  @keyframes gradient-shift{
    0%{ background-position:0% 50%; }
    100%{ background-position:300% 50%; }
  }

  @media (prefers-reduced-motion: reduce){
    .corner-label span{ animation:none; }
  }

  /* --- Centerpiece --- */
  .center-text{
    text-align:center;
    animation: rise 0.7s ease both;
    animation-delay:0.08s;
  }

  .center-text h1{
    font-size:34px;
    font-weight:800;
    letter-spacing:0.2px;
    color:var(--text-main);
    text-shadow:0 0 18px rgba(120,140,255,0.85), 0 0 40px rgba(88,101,242,0.55), 0 4px 20px rgba(0,0,0,0.35);
    text-align:center;
    cursor:pointer;
    transition:color 0.7s ease, opacity 0.7s ease, text-shadow 0.7s ease;
  }

  .center-text span{
    color:#c9cdff;
    transition:color 0.7s ease;
  }

  .center-text h1:hover{
    animation:rainbow-text 3.2s ease-in-out infinite;
    text-shadow:0 0 20px rgba(255,255,255,0.6), 0 0 44px rgba(255,255,255,0.3);
  }

  .center-text h1:hover span{
    animation:rainbow-text 3.2s ease-in-out infinite;
  }

  @keyframes rainbow-text{
    0%{ color:#ff5f6d; opacity:0.55; }
    16%{ color:#ff9a3c; opacity:1; }
    33%{ color:#f9f871; opacity:1; }
    50%{ color:#5ef2a0; opacity:0.55; }
    66%{ color:#5ec8f2; opacity:1; }
    83%{ color:#b98cf2; opacity:1; }
    100%{ color:#ff5f6d; opacity:0.55; }
  }

  @media (prefers-reduced-motion: reduce){
    .center-text h1:hover, .center-text h1:hover span{ animation:none; }
  }

  /* --- Action buttons --- */
  .actions{
    display:flex;
    gap:18px;
    animation: rise 0.7s ease both;
    animation-delay:0.16s;
  }

  .icon-btn{
    width:64px; height:64px;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    background:var(--card-bg);
    border:none;
    cursor:pointer;
    box-shadow:0 10px 25px rgba(0,0,0,0.35);
    transition:transform 0.18s ease, background 0.18s ease, box-shadow 0.18s ease;
    color:var(--text-main);
    position:relative;
  }

  .icon-btn:hover{
    transform:translateY(-4px);
    box-shadow:0 16px 32px rgba(0,0,0,0.45);
  }

  .icon-btn:focus-visible{
    outline:3px solid #ffffff;
    outline-offset:3px;
  }

  .icon-btn.youtube:hover{ background:var(--yt-red); }
  .icon-btn.discord:hover{ background:var(--blurple); }

  .icon-btn svg{ width:28px; height:28px; }

  /* --- Toast --- */
  .toast{
    position:fixed;
    bottom:38px;
    left:50%;
    transform:translateX(-50%) translateY(10px);
    background:var(--card-bg-2);
    color:var(--text-main);
    padding:12px 20px;
    border-radius:10px;
    font-size:14px;
    font-weight:600;
    box-shadow:0 12px 30px rgba(0,0,0,0.4);
    opacity:0;
    pointer-events:none;
    transition:opacity 0.35s ease, transform 0.35s ease;
    z-index:10;
    display:flex;
    align-items:center;
    gap:8px;
  }

  .toast.show{
    opacity:1;
    transform:translateX(-50%) translateY(0);
  }

  .toast svg{ width:16px; height:16px; color:var(--online); flex-shrink:0; }

  @keyframes rise{
    from{ opacity:0; transform:translateY(14px); }
    to{ opacity:1; transform:translateY(0); }
  }

  /* --- Message modal --- */
  .modal-overlay{
    position:fixed;
    inset:0;
    z-index:20;
    background:rgba(5,6,18,0.6);
    backdrop-filter:blur(6px);
    display:flex;
    align-items:center;
    justify-content:center;
    opacity:0;
    pointer-events:none;
    transition:opacity 0.25s ease;
    padding:20px;
  }

  .modal-overlay.open{
    opacity:1;
    pointer-events:auto;
  }

  .modal-box{
    width:100%;
    max-width:380px;
    background:rgba(24,26,40,0.96);
    border:1px solid rgba(255,255,255,0.08);
    border-radius:16px;
    box-shadow:0 24px 60px rgba(0,0,0,0.55), 0 0 0 1px rgba(255,255,255,0.02);
    padding:24px;
    transform:translateY(16px) scale(0.98);
    transition:transform 0.25s ease;
    position:relative;
    overflow:hidden;
  }

  .modal-box::before{
    content:"";
    position:absolute;
    inset:-2px;
    border-radius:18px;
    padding:2px;
    background:linear-gradient(120deg,#ff9ecf,#8f9bff,#7ee8fa,#ff9ecf);
    background-size:300% 300%;
    -webkit-mask:linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
    -webkit-mask-composite:xor;
    mask-composite:exclude;
    animation:gradient-shift 6s linear infinite;
    opacity:0.6;
    pointer-events:none;
  }

  .modal-overlay.open .modal-box{
    transform:translateY(0) scale(1);
  }

  .modal-eyebrow{
    font-size:11px;
    font-weight:700;
    letter-spacing:0.6px;
    text-transform:uppercase;
    color:#8f9bff;
    margin-bottom:6px;
  }

  .modal-title{
    font-size:18px;
    font-weight:800;
    margin-bottom:4px;
    background:linear-gradient(90deg,#ff9ecf,#c9a6ff);
    -webkit-background-clip:text;
    background-clip:text;
    color:transparent;
  }

  .modal-sub{
    font-size:12.5px;
    color:var(--text-dim);
    margin-bottom:18px;
  }

  .field-label{
    font-size:11px;
    text-transform:uppercase;
    letter-spacing:0.4px;
    color:var(--text-dim);
    font-weight:700;
    margin-bottom:6px;
    display:block;
  }

  .field-input, .field-textarea{
    width:100%;
    background:rgba(255,255,255,0.05);
    border:1px solid rgba(255,255,255,0.1);
    border-radius:8px;
    padding:10px 12px;
    color:var(--text-main);
    font-size:13.5px;
    font-family:inherit;
    margin-bottom:16px;
    transition:border-color 0.2s ease;
  }

  .field-textarea{
    resize:vertical;
    min-height:90px;
  }

  .field-input:focus, .field-textarea:focus{
    outline:none;
    border-color:var(--blurple);
  }

  .modal-actions{
    display:flex;
    justify-content:flex-end;
    gap:10px;
  }

  .modal-btn{
    padding:9px 18px;
    border-radius:8px;
    font-size:13.5px;
    font-weight:700;
    border:none;
    cursor:pointer;
    transition:filter 0.15s ease, transform 0.15s ease;
  }

  .modal-btn:hover{ transform:translateY(-1px); }

  .modal-btn.cancel{
    background:rgba(255,255,255,0.08);
    color:var(--text-main);
  }

  .modal-btn.send{
    background:linear-gradient(120deg,var(--blurple),#8f5fe8);
    color:#fff;
    box-shadow:0 6px 18px rgba(88,101,242,0.45);
  }

  .modal-btn.send:hover{
    box-shadow:0 8px 24px rgba(143,95,232,0.55);
  }

  .modal-btn:disabled{
    opacity:0.6;
    cursor:not-allowed;
    transform:none;
  }

  .modal-close{
    position:absolute;
    top:16px;
    right:16px;
    background:none;
    border:none;
    color:var(--text-dim);
    font-size:18px;
    cursor:pointer;
    line-height:1;
  }

  .modal-box{ position:relative; }

  footer.credit{
    position:fixed;
    bottom:10px;
    font-size:11px;
    color:rgba(255,255,255,0.35);
    z-index:2;
  }

  footer.credit a{
    color:rgba(180,190,255,0.6);
    text-decoration:none;
    transition:color 0.2s ease;
  }

  footer.credit a:hover{
    color:#c9a6ff;
    text-decoration:underline;
  }
</style>
</head>

    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M4 12l6 6L20 6"/></svg>
    <span id="toastText">Discord Id copied</span>
  </div>

  <footer class="credit"><a href="https://discord.gg/q7eRJKKJYs" target="_blank" rel="noopener">discord.gg/q7eRJKKJYs</a></footer>

  <script>
    (function(){
      var field = document.getElementById('particles');
      var count = window.innerWidth < 600 ? 18 : 32;
      for(var i=0;i<count;i++){
        var p = document.createElement('div');
        p.className = 'particle';
        var left = Math.random()*100;
        var size = (Math.random()*3+2).toFixed(1);
        var duration = (Math.random()*10+10).toFixed(1);
        var delay = (Math.random()*14).toFixed(1);
        var drift = (Math.random()*60-30).toFixed(0)+'px';
        p.style.left = left+'%';
        p.style.width = size+'px';
        p.style.height = size+'px';
        p.style.setProperty('--drift', drift);
        p.style.animationDuration = duration+'s';
        p.style.animationDelay = '-'+delay+'s';
        field.appendChild(p);
      }
    })();

    document.getElementById('ytBtn').addEventListener('click', function(){
      window.open('https://www.youtube.com/@LazyPtx2', '_blank');
    });

    var toast = document.getElementById('toast');
    var toastText = document.getElementById('toastText');
    var toastTimer;

    function showToast(text){
      toastText.textContent = text;
      clearTimeout(toastTimer);
      toast.classList.add('show');
      toastTimer = setTimeout(function(){
        toast.classList.remove('show');
      }, 2200);
    }

    document.getElementById('discordBtn').addEventListener('click', function(){
      var username = 'Not_GamingLife';

      function fallbackCopy(text){
        var ta = document.createElement('textarea');
        ta.value = text;
        ta.style.position = 'fixed';
        ta.style.opacity = '0';
        document.body.appendChild(ta);
        ta.select();
        try{ document.execCommand('copy'); }catch(e){}
        document.body.removeChild(ta);
      }

      if(navigator.clipboard && navigator.clipboard.writeText){
        navigator.clipboard.writeText(username).then(function(){
          showToast('Discord Id copied');
        }).catch(function(){
          fallbackCopy(username);
          showToast('Discord Id copied');
        });
      } else {
        fallbackCopy(username);
        showToast('Discord Id copied');
      }
    });

    /* --- Message modal + Discord webhook send --- */
    // Paste your Discord webhook URL below (Server Settings > Integrations > Webhooks).
    var DISCORD_WEBHOOK_URL = "https://discord.com/api/webhooks/1526869294565294163/pJYYMi0ystp5pG5LVlVaNYXP5v_chNzWs8IHVQhPIEXCiDyH-knrV--CHGlLsT7_CXzs";

    var overlay = document.getElementById('modalOverlay');
    var usernameField = document.getElementById('msgUsername');
    var bodyField = document.getElementById('msgBody');
    var sendBtn = document.getElementById('modalSend');

    function openModal(){
      overlay.classList.add('open');
      setTimeout(function(){ usernameField.focus(); }, 200);
    }
    function closeModal(){
      overlay.classList.remove('open');
    }

    document.getElementById('openModalBtn').addEventListener('click', openModal);
    document.getElementById('modalCancel').addEventListener('click', closeModal);
    document.getElementById('modalClose').addEventListener('click', closeModal);
    overlay.addEventListener('click', function(e){
      if(e.target === overlay) closeModal();
    });

    sendBtn.addEventListener('click', function(){
      var uname = usernameField.value.trim();
      var msg = bodyField.value.trim();

      if(!uname || !msg){
        showToast('Fill in both fields');
        return;
      }

      if(!DISCORD_WEBHOOK_URL || DISCORD_WEBHOOK_URL.indexOf('PASTE_YOUR') === 0){
        showToast('Webhook not configured yet');
        return;
      }

      sendBtn.disabled = true;
      sendBtn.textContent = 'Sending...';

      fetch(DISCORD_WEBHOOK_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ content: uname + ': ' + msg })
      }).then(function(res){
        if(!res.ok){
          return res.text().then(function(t){
            throw new Error('HTTP ' + res.status + ': ' + t);
          });
        }
        showToast('Message sent!');
        usernameField.value = '';
        bodyField.value = '';
        closeModal();
      }).catch(function(err){
        console.error('Webhook send failed:', err);
        showToast("Couldn't send (see console)");
      }).finally(function(){
        sendBtn.disabled = false;
        sendBtn.textContent = 'Send';
      });
    });
  </script>
